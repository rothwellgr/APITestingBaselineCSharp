services:
  httpbin:
    image: kennethreitz/httpbin
    platform: linux/amd64
    container_name: httpbin

  jenkins:
    build:
      context: jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "8080:8080"
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    depends_on:
      - httpbin

volumes:
  jenkins_home:
